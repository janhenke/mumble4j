# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  JAVA_VERSION: 25

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v3
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "QUARKUS_CONTAINER_IMAGE_USERNAME=${{ github.actor }}" >> $GITHUB_ENV
          echo "QUARKUS_CONTAINER_IMAGE_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          echo "QUARKUS_CONTAINER_IMAGE_IMAGE=ghcr.io/${{ github.repository }}:latest" >> $GITHUB_ENV
          echo "QUARKUS_JIB_PLATFORMS=linux/amd64,linux/arm64/v8" >> $GITHUB_ENV

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Publish Docker image
        run: mvn -B package --file pom.xml -Dquarkus.container-image.build=true -Dquarkus.container-image.push=true
